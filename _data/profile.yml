zh:
  site_title: "武振建学术主页"
  name: "武振建"
  name_secondary: "Zhenjian Wu"
  position: "中南财经政法大学会计学博士生"
  affiliation: "中南财经政法大学"
  location: "武汉，中国"
  email: "2671180152@qq.com"
  bio: >-
    武振建，中南财经政法大学会计学博士生。研究关注 AI 在财务、会计与审计中的应用，
    以及中国非上市企业、劳动市场、分析师与债券市场等议题。当前工作强调利用大规模招聘、
    工商和专利数据开展可复制的实证研究，并将面板分析、多种 DID 技术、大模型微调、
    Python、机器学习与 QCA 等方法用于会计学研究。
  credential_line: "已通过中国注册会计师考试专业阶段。"
  bio_extra: >-
    希望与对中国企业、创新、劳动市场、非上市企业和 AI 经济后果感兴趣的研究者建立合作。
  signature_line: "关注技术变迁如何进入企业、信息环境与真实经济活动。"
  highlight_items:
    - "AI 与财会审"
    - "劳动市场与非上市企业"
    - "招聘、工商与专利数据"
    - "面板分析、DID、机器学习与 QCA"
  overview_cards:
    - title: "研究议题"
      body: "围绕 AI、企业信息环境、劳动市场和非上市企业行为展开研究，强调技术变迁与制度环境的交互。"
    - title: "数据基础"
      body: "可使用招聘数据、工商数据、上市公司创新专利数据，并熟悉全量专利数据的研究化处理。"
    - title: "方法路线"
      body: "掌握面板分析、多种 DID 技术、大模型微调、Python、机器学习与 QCA 在会计学研究中的应用，并擅长对实证论文进行设计。"
  collaboration: >-
    欢迎围绕 AI 与财会审、劳动市场、非上市企业、创新与专利等主题开展合作。
    如果你对共同写作、数据共建、研究设计讨论或方法交流感兴趣，欢迎通过邮箱联系。

en:
  site_title: "Zhenjian Wu"
  name: "Zhenjian Wu"
  name_secondary: "武振建"
  position: "Ph.D. Student in Accounting, Zhongnan University of Economics and Law"
  affiliation: "Zhongnan University of Economics and Law"
  location: "Wuhan, China"
  email: "2671180152@qq.com"
  bio: >-
    Zhenjian Wu is a Ph.D. student in Accounting at Zhongnan University of Economics and Law.
    His research focuses on AI in accounting, finance, and auditing, as well as Chinese non-listed firms,
    labor markets, analysts, and bond markets. He is particularly interested in building reproducible empirical
    research with large-scale hiring, firm registry, and patent data, and in applying panel analysis, multiple DID
    designs, LLM fine-tuning, Python, machine learning, and QCA to accounting research.
  credential_line: "Passed the professional-stage examination of the Chinese CPA."
  bio_extra: >-
    Open to collaboration with researchers interested in Chinese firms, innovation, labor markets,
    non-listed firms, and the economic consequences of AI.
  signature_line: "Interested in how technological change enters firms, information environments, and real economic activity."
  highlight_items:
    - "AI in accounting and auditing"
    - "Labor market and non-listed firms"
    - "Hiring, firm registry, and patent data"
    - "Panel analysis, DID, ML, and QCA"
  overview_cards:
    - title: "Themes"
      body: "Research centers on AI, firm information environments, labor markets, and Chinese non-listed firms, with attention to how technology interacts with institutions."
    - title: "Data"
      body: "Works with large-scale hiring data, firm registry records, listed-firm innovation patent data, and research-ready processing of full patent databases."
    - title: "Methods"
      body: "Works with panel analysis, multiple DID designs, LLM fine-tuning, Python, machine learning, and QCA in accounting research, with particular strength in empirical paper design."
  collaboration: >-
    Collaboration is welcome on topics related to AI and accounting, labor markets, non-listed firms,
    innovation, and patent-based research. Please feel free to reach out for coauthorship, data collaboration,
    research design discussions, or method exchange.

research_interests:
  - zh: "AI 与财会审"
    en: "AI in Accounting and Auditing"
    desc_zh: "关注 AI 技术对财务报告、审计流程、信息中介和资本市场行为的影响。"
    desc_en: "Examines how AI technologies reshape financial reporting, auditing, information intermediaries, and capital market behavior."
  - zh: "AI 与劳动市场"
    en: "AI and Labor Markets"
    desc_zh: "关注智能计算基础设施、岗位需求变化与企业数字化转型之间的关系。"
    desc_en: "Studies intelligent computing infrastructure, labor demand adjustment, and digital transformation at the firm level."
  - zh: "非上市企业（中国）"
    en: "Chinese Non-listed Firms"
    desc_zh: "以工商与企业登记数据为基础，研究中国非上市企业的行为、治理与创新。"
    desc_en: "Uses business registration and firm-level records to study behavior, governance, and innovation among Chinese non-listed firms."
  - zh: "分析师与债券市场"
    en: "Analysts and Bond Markets"
    desc_zh: "关注资本市场信息环境、分析师行为与债券市场定价机制。"
    desc_en: "Explores information environments, analyst behavior, and pricing mechanisms in bond markets."

